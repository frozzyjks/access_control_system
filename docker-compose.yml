services:
  access-manager:
    build:
      context: ./services/access-manager
    container_name: access-manager
    environment:
      SERVICE_NAME: access-manager
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      ACCESS_REQUEST_TOPIC: ${ACCESS_REQUEST_TOPIC:-access.requests}
      RESOURCE_CATALOG_URL: ${RESOURCE_CATALOG_URL:-http://resource-catalog:8000}
    ports:
      - "8001:8000"
    depends_on:
      kafka:
        condition: service_started

      resource-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  policy-engine:
    build:
      context: ./services/policy-engine
    container_name: policy-engine
    environment:
      SERVICE_NAME: policy-engine
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_ACCESS_REQUEST_TOPIC: ${ACCESS_REQUEST_TOPIC:-access.requests}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-policy-engine-group}
      RESOURCE_CATALOG_URL: ${RESOURCE_CATALOG_URL:-http://resource-catalog:8000}
    ports:
      - "8002:8000"
    depends_on:
      kafka:
        condition: service_started
      resource-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  resource-catalog:
    build:
      context: ./services/resource-catalog
    container_name: resource-catalog
    environment:
      SERVICE_NAME: resource-catalog
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${RESOURCE_CATALOG_DATABASE_URL:-postgresql+asyncpg://resource_catalog:resource_catalog@resource-catalog-db:5432/resource_catalog}
    ports:
      - "8003:8000"
    depends_on:
      resource-catalog-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  resource-catalog-db:
    image: postgres:16-alpine
    container_name: resource-catalog-db
    environment:
      POSTGRES_DB: resource_catalog
      POSTGRES_USER: resource_catalog
      POSTGRES_PASSWORD: resource_catalog
    ports:
      - "5435:5432"
    volumes:
      - resource_catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resource_catalog -d resource_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"

volumes:
  resource_catalog_db_data:
